version: '3.9'

services:
  # ── PostgreSQL (local development) ──────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       sas_garments
      POSTGRES_USER:     sas_user
      POSTGRES_PASSWORD: sas_dev_pass
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sas_user -d sas_garments']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── pgAdmin (optional, local UI) ────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sas_pgadmin
    restart: unless-stopped
    profiles: ['tools']
    environment:
      PGADMIN_DEFAULT_EMAIL:    dev@sas.local
      PGADMIN_DEFAULT_PASSWORD: devpass
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
