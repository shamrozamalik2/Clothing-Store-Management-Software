version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# SAS Garments – Docker Compose
#
# Local dev  :  docker compose up
# With pgAdmin:  docker compose --profile tools up
# Production  :  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-sas_garments}
      POSTGRES_USER:     ${POSTGRES_USER:-sas_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sas_dev_pass}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-sas_user} -d ${POSTGRES_DB:-sas_garments}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Backend API ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: sas_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-sas_user}:${POSTGRES_PASSWORD:-sas_dev_pass}@postgres:5432/${POSTGRES_DB:-sas_garments}
      NODE_ENV:     ${NODE_ENV:-development}
    ports:
      - '${PORT:-3001}:3001'
    volumes:
      - uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Nginx reverse proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: sas_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - uploads:/var/www/uploads:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy

  # ── Certbot (Let's Encrypt) ───────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: sas_certbot
    profiles: ['ssl']
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "
        certbot certonly --webroot
          --webroot-path=/var/www/certbot
          --email ${CERT_EMAIL}
          --agree-tos --no-eff-email
          -d ${DOMAIN}
          && echo 'Certificates obtained.'
      "

  # ── pgAdmin (optional dev tool) ────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sas_pgadmin
    restart: unless-stopped
    profiles: ['tools']
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-dev@sas.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-devpass}
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
  uploads:
  certbot_webroot:
  certbot_certs:
  logs:
