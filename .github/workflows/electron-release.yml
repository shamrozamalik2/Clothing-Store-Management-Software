name: Release Electron App

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # e.g. v1.2.3

permissions:
  contents: write   # needed to create GitHub Release and upload assets

jobs:
  build-windows:
    name: Build & Publish (Windows)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install all dependencies
        run: npm install --no-audit

      # Build frontend with client-specific env vars baked in
      - name: Build frontend
        env:
          VITE_API_URL:        ${{ secrets.VITE_API_URL }}
          VITE_COMPANY_SLUG:   ${{ secrets.VITE_COMPANY_SLUG }}
        run: npm run build:frontend

      # Build Electron installer + portable and publish to GitHub Releases
      - name: Build & Publish Electron
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --win --publish always

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist-electron/*.exe
            dist-electron/*.yml
            dist-electron/*.yaml
          retention-days: 7

