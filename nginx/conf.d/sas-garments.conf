# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN.com;

    # Let's Encrypt certificates (mounted from certbot volume)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security ──────────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy   "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" always;

    client_max_body_size 20M;

    # ── Auth endpoints — strict rate limit ────────────────────────────────
    location /api/auth/ {
        limit_req  zone=auth  burst=10  nodelay;
        proxy_pass http://backend;
        include    /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── API ───────────────────────────────────────────────────────────────
    location /api/ {
        limit_req  zone=api  burst=50  nodelay;
        proxy_pass http://backend;
        include    /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Uploads — serve directly from volume ─────────────────────────────
    location /uploads/ {
        alias      /var/www/uploads/;
        expires    30d;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # ── Health check (no auth needed) ─────────────────────────────────────
    location /health {
        proxy_pass  http://backend/api/health;
        include     /etc/nginx/conf.d/proxy_params.conf;
        access_log  off;
    }

    # ── Block hidden files ────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
