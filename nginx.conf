# ─────────────────────────────────────────────────────────────────
# Nginx config for SAS Garments Cloud API
# Place at: /etc/nginx/sites-available/sas-garments
# Enable:   sudo ln -s /etc/nginx/sites-available/sas-garments /etc/nginx/sites-enabled/
# SSL:      sudo certbot --nginx -d api.yourdomain.com
# ─────────────────────────────────────────────────────────────────

upstream sas_api {
    server 127.0.0.1:3001;
    keepalive 64;
}

server {
    listen 80;
    server_name api.yourdomain.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    # SSL – managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header X-Content-Type-Options   "nosniff"    always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection         "1; mode=block" always;

    # Upload size limit (match backend 10mb)
    client_max_body_size 10M;

    # Proxy to Node.js
    location /api/ {
        proxy_pass         http://sas_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Serve uploaded files directly
    location /uploads/ {
        alias /var/www/sas-garments/uploads/;
        expires 1d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health check – no auth needed
    location = /api/health {
        proxy_pass http://sas_api;
    }
}
